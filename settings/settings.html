<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
    }
    
    h1 {
      color: #333;
    }
    
    .rule-form {
      background-color: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }
    
    .form-group {
      margin-bottom: 10px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    
    input, select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    
    button {
      background-color: #4285f4;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    
    button:hover {
      background-color: #3367d6;
    }
    
    .rules-list {
      margin-top: 20px;
    }
    
    .rule-item {
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 4px;
      background-color: #fff;
    }
    
    .delete-btn {
      background-color: #ea4335;
      float: right;
    }
    
    .delete-btn:hover {
      background-color: #d32f2f;
    }
    
    .rule-info {
      margin-top: 5px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>URL Redirector Settings</h1>
  
  <div class="rule-form">
    <h2>Add New Rule</h2>
    <div class="form-group">
      <label for="sourcePattern">Source Pattern (e.g., example.com/id=)</label>
      <input type="text" id="sourcePattern" placeholder="e.g., example.com/id=">
    </div>
    
    <div class="form-group">
      <label for="parameter">Parameter to Extract (e.g., id)</label>
      <input type="text" id="parameter" placeholder="e.g., id">
    </div>
    
    <div class="form-group">
      <label for="targetPattern">Target Pattern (e.g., anotherexample.com/record_id=)</label>
      <input type="text" id="targetPattern" placeholder="e.g., anotherexample.com/record_id=">
    </div>
    
    <button id="addRuleBtn">Add Rule</button>
  </div>
  
  <div class="rules-list">
    <h2>Current Rules</h2>
    <div id="rulesContainer"></div>
  </div>
  
  <script src="settings.js"></script>
</body>
</html>
